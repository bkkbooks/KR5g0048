body:
  text: 太上三五正一盟威寳籙二十四階太最尊也太也極也通也三界獨尊衆聖之極即所謂道君也於理即天尊道君老君一也以三清應化之階即有方品之異矣今於此籙而言老君也授正一盟威籙於三天法師以傳于世使過度衆災落除黑薄召鬼役靈進品仙職故曰三五正一盟威寳籙三者三才各備五者黃中緫數統御生死以攝萬靈安鎮人身元精固守也又以三五爲日月之數戊巳配於坎離也人禀隂陽正氣三元五運萬象必全由心而正心正則神精不虧與我爲一然後全日月之明合五靈之本故能死生無變於巳何邪異之所能干由是煥照群隂威伏六賊是謂正一盟威學道之士用此天真靈文赤章雲篆保守正真永爲身寳故曰寳籙然後可以隨功舉遷役靈召鬼玉女給侍仙廚備供乗虚躡煙亦不待諸法但縁俗間紛擾心不能精故應驗不至耳昔張天師所受傳示所以隨其修用臨事制御階級不同名目甚衆至於修身度厄以保真正者師師相傳二十四階以應上八景中八景下八景二十四氣也籙生必先受持七十五仙官將軍七十五靈官將軍是爲百五十將軍所以先正人身二具内外神靈品數仙靈二品各有符一通太上神文也凡在籙諸符篆亦不可備識但當按法而行其解釋符篆别具三洞符解然亦有未詳者自非得道合神不能備悉又不宜曲以俗解深悮聖㫖也其仙靈二官百五十將軍籙一階中仙童玉女功曹吏兵皆應氣而有雖約以位數若變化無窮固不可勝紀今且聊釋隂陽大數云太上三五正一盟威仙靈百五十將軍籙仙官三陽之氣其數七十五者卯辰巳爲三陽卯數六辰數五已數四而以三五乗之得也所以用五乗之者五爲中央戊巳終始之大紀也以五乗六五六三十以五乗五五五二十五以五乗四四五二十故得七十五也仙官主治内以保臓府關竅筋骨氣血一身之事也人不犯衆惡不逆三陽則仙官祐人血氣和平五臓納靈神室明正通真契道也佩受寳籙深宜保之靈官三隂之氣其數七十五者酉戌玄爲三隂酉數六戌數五亥數四而以三五乗之如三陽數均得七十五也靈官主治外以守衛人身形舍宇治邑四墟所至也人不犯衆惡不逆三隂保守中和之道幽明咸暢天地同德佩受靈文以時齋醮祈請靈官吏兵神童玉女應人驅使可徃八海之外求取妙藥與巳同飛洞府諸靈山功德圓滿得具上帝任爲正一眞人之秩受道佩籙可不勉歟巳前仙靈二官百五十將軍籙具如數解是隂陽六氣之正神然而隂中有陽陽中有隂仙靈亦有靈官靈官亦有仙靈不可一致但隂陽各以所治爲師長也言將軍所以主領群使以齊禦備衛也餘一一依籙文而行不復具述太上三五正一盟威三元將軍籙唐葛周三將軍是太上三元官三氣正神水火之元精也下應人身心宫兩賢在天主治北斗中圖形數及符璽靈文盟劵具籙令人知道保真佩服寳籙言功醮請以時則三將軍見形功業旣圖於是三神與已俱昇也别具醮法於後太上三五正一盟威混沌元命赤籙混沌始生元胎結形皆禀璇璣七政分化萬靈修存之事具如籙文功成道備元眞合昇太上三五正一盟威都天九鳯破穢籙丹元之精爲九色神鳯足歩星罡鼓翼振威導達天路故六官隂氣萬類妖氛莫得干犯眞官也學士佩受此籙以盪諸殗穢凡施爲法事宜以爲先精思存注不可闕怠也久而行之鳯宜令人形體洞潔耳目聦明徹視無外修行功滿與巳齊昇九天也太上三五正一盟威護命長生籙佩受精持此籙即北宫落死南斗注生三辰煥形天地同壽扁鵲醫吏玉女仙人存念醮請一如籙部太上三五正一盟威九宫捍厄八卦護身籙此籙是九眞神籍八卦靈文太上宻㫖勑勒八方九地主厄之神使驅除衆害無犯正氣度陽九百六隂陽災運久而修之八卦真神與巳同昇爲九天之任當隨功果而遷也太上三五正一盟威太玄四部禁氣籙夫制禦萬靈通真達道無不由禁攝五行之精吐納元氣握覽文節關啓機源取捨在巳存乎指掌以統天地逮乎昆蟲毒蠆微蔑蠕喘禽魚鳥獸鱗甲羽毛有形無形群精異𩔖莫不調伏從吾禁舍者矣受氣諸法雖具籙文亦在明師事事口訣斯四部禁氣籙以録章表上聞以爲禁術之緫統也深宜佩受奉而修之以助眞道耳太上三五正一盟威龍虎軒邪籙龍虎者金木之精道君左右之衞神震威以視則萬魔攝伏群妖束形修之感通得仙道之時龍虎挾巳而昇也太上三五正一盟威都章畢印籙以籙六甲印文中部諸印緘封章表符圖並主之籙中執印將吏仙童玉女等以學人勤修精感則給受驅役宜醮祭不闕以期靈應其造印諸法别具儀注太上三五正一盟威歩星綱籙仙術出有入無變化萬端皆由歩綱躡紀其法皆象三辰之氣以致神靈自有上中下三洞綱訣隨其所用不同一如本籙修學此乃中部三五赤天歩星綱事佩受此籙可以緫括諸禁法久久精勤當乗空歩虛白日昇仙也太上三五正一盟威天靈赤官斬邪籙此籙是三五赤天丹極元陽君威震萬邪洞煥凶逆誅剪群魔惡鬼使從道化修事有功濟度死厄使人錬質昇天也太上三五正一盟威九州社令籙能召命九州里社地司衆靈一依籙文行事太上三五正一盟威百鬼召籙以召百鬼萬靈指撝從命不使妄恣淫害以擾兆民當依律令其法具籙文及師傳授之太上三五正一盟威考召籙世有雲中鬼子九醜衆精及土水木石𨽻形異質變化諸妖有𩔖魑魅爲生民害當以三五考召符吏追而問之法具籙訣從師授之太上三五正一盟威斬千鬼萬神籙萬邪凶逆干擾世間不從道化當召三五赤天吏兵大震神威施斧鉞以誅滅之不可常用太上三五正一盟威九天兵符籙太上九天眞符籙太上九天都統畢籙此巳上籙都校九天三五靈官吏兵四荒八極無鞅數衆畢具佩受修行宜三會吉日簡閱醮請言功舉遷一如籙文行事太上華蓋斬邪籙太上三五辟邪籙請辟邪斬邪約十餘階隨師所傳不可爲定數太上三皇捍厄籙太上諸度厄過災籙太上解六害神符籙有諸禳却毒螫萬害符籙等約十餘階不可定數當隨師而傳太上女青詔書籙太上九光萬勝籙太上中部赤籙太上北帝籙太上七星籙太上丹剛粉火籙太上北斗眞劵籙諸籙各依本師傳授一如籙文奉行其階數應氣止於二十四階太上童子一將軍籙此爲童子佩持亦三五正一之部具如科文三五眞劵師資授受之約道科傳付經訣皆結盟立誓期以勿洩於非其人當分環破劵飲丹告誓不負道真修諸善事不殺生淫祀妄作邪僞違天背道盟約故有其眞劵其三洞法各依本科備之事具傳授儀天師治局張天師修治正一法於西蜀各依本事本法感應之處是爲靜治以象二十四氣亦有諸治舍散在名山按宜當配五行依本命生月以受之毎一治應一氣治之長曰陽平治應左平氣女人應右平氣一如科儀本法若都受諸治氣傳天師三師都功版今受治正一籙秪傳本屬治氣也事具治儀正一經正一朝真儀正一齋儀關奏章表儀閱籙儀醮籙儀此巳上儀注科文具正一經其八節甲子庾申本命三㑹三元朔望日或朝禮或醮閱或言功奏章各具本儀依師授傳行之右巳上爲正一盟威一部次進受洞神參爲中法儀具三洞奉道科眞文三卷諸天内音靈寳眞文八景天書五法五卷老君六甲祕符靈寳五符五嶽眞形圖三皇内文西嶽公禁山文巳上並各依本文存思修奉此中法部是爲洞玄參于上法具三洞奉道科目正一籙巳釋其文旣歷要門感應斯驗參乎中法具如科條然三洞靈文非不周細修行之要在於服氣若五氣大全則神眞咸備師傳修氣之訣不在籙文今謹述五氣星綱眞訣眞師曰含生咸禀一氣受化於隂陽以遂其動用唯人最靈四大五常自然全備動用微妙與神靈通夫動念所適無分遠邇幽深也不疾而速不行而至感通之理豈外物哉故萬法去來由心自造夫唯無爲無造故能無所不造人能淡泊清靜真氣自全是故無爲也能爲萬物之主而無所不爲焉若滑欲亂神則不能感眞應物也但人間多事觸情縱欲散擾神氣必累幽明禍縈先後驗之非逺可不畏歟人能無虧於五常不亂於神氣但得千日不間雜者則可以通感神靈解脫殃厄受洞玄清靜謹守必五靈眞氣見形方可存注仙真衆聖之形得歩躡星綱俯仰如法勤修五年或七年九年則可以致五帝雲軿眞官下迎當獲仙道存亡自在也守眞存氣躡紀昇綱勿犯五常勿亂精神勿穢觸臟府勿履雜處精思齋室日日爲常無使間闕一年之應便可以威制萬魔役使鬼吏當隨意想念攻擊患害救諸疾苦無不立應不擇逺近萬里瞬息間也所謂萬化之中唯人最靈也能存其靈眞保其神氣乃爲仙人故曰宇宙在乎手萬化生乎身法象之大修術之原當佩靈寳五符五嶽眞形圖修存五靈氣歩躡九元握覽玄機以通天達地也世有不負四大無虧五常者可按而行其術也訣曰子若虧於仁則青帝非眞子若虧於義則白帝非眞子若虧於禮則赤帝非眞子若虧於智則黒帝非眞子若虧於信則黄帝非眞夫五氣之道體通神眞子不負道違眞即可修用是以道君保而傳之於至人以助自然以調元化修之於身而感於天天乃五行順序地乃五嶽安鎮人乃五臟保和神乃五靈運御是故惟虧五德凶惡順焉真人存用五氣法先當勿食葷血之物勿履殗汙絶除欲念檢身口意業令得清淨續别造一室沐浴盛潔以立春日雞鳴時面月建寅方平坐調氣瞑目叩齒三十六通叩齒欲深而微緩漱咽津液䁝目左右各三握固臨目都忘萬慮放乎太空無起無絶良久覺身中通暖當摇動支體任吐濁氣即又調息當抱守氣海朝太淵北極丹田眞宫稍用力深深滿甚太淵則覺百關氣歸朝其内也如此數過復𡨋心太空若東方洞然無有隔礙徐徐鼻引氣使極存見五臟覺東方青帝眞氣從肝中周迴内外一體念身中三萬六千神與青帝眞氣合又調息咽液良久起立再拜事竟如此日日勿闕至驚蟄面卯也盡寅卯節至清明日面辰存黄氣從脾中周迴内外洞徹也至立夏日面巳存赤氣從心中周迴内外也芒種日面午也小暑面未存黄氣從脾中周迴内外也至立秋日面申存白氣從肺中出周迴内外也白露日面酉至寒露面戌存黄氣從脾中出周迴内外也至立冬面亥存黒氣從腎中出周迴内外也至大雪面子也至小寒面丑存黄氣從脾中出周迴内外也此一周年五氣備全矣其存想調息次第法用如初說䁝目叩齒亦𥘉數不須等級可也至明年立春日重習三日或五日七日九日如去年次第爲常以朝其氣也用氣由心由心應手當抱覽三才五行萬靈之目也夫掌訣以握固爲緫法所謂運魁綱封五嶽關三畢捉鬼道攬河源固眞氣而幽顯備統之也事竟即隨息訣遣以散其氣凡指訣女人尚右男子即尚左隂陽之體然也大指屬土食指火中指木無名金小指水從根節爲孟仲節頭節季指甲之目爲五行刀支刀支主殺也斬邪誅逆用之五氣旣全當隨五𩔖互相制伏無不如意握固法以大指掠四指經人門畢鬼道三過隨文關氣握之指節按十二辰亦隨其相生相剋𩔖例用之也諸歩綱起於三歩九跡是謂禹歩其來甚遠而夏禹得之因而摶世非禹所作所以統三元九星三極九宫以應太陽大數其法先舉左一跬一歩一前一後一隂一陽𥘉與終同歩置脚横直互相承如丁字所以亦象隂陽之會也踵小虛相及勿使歩闊狹失䂓矩當握固閉氣實于太淵宫䁝目三臨目叩齒存神使四靈衞已騎吏羅列前後左右五方五帝兵馬都本位北斗覆頭斗杓在前指其方常背建擊破也歩九跡竟閉氣却退復本跡又進是爲三支即左轉身都遣神氣綱目直如本意攻患害除遣衆事行用訖却閉目存神調氣歸息于太淵宫當咽液九過其禁勑符水等請五方五帝眞氣如常言眞師曰先習五氣一年乃習三歩九跡星綱一年無差然後行諸禁法隨意剋中如神也能清慎守道久久飛仙度世古人眞仙聖王皆得之以佐世治俗但世傳不眞妄生穿鑿惟按此行之乃見其驗先師云三歩九跡如旣濟卦得星綱眞訣又須修習五帝之氣及握固掌訣始合其宜是以通徹眞原也若但受持符圖寳籙不得師傳修用之門終不獲靈驗一如籙文不爾且謂尊奉供養而巳爲之善緑用資來業者右巳上五法受氣行氣訣禹歩星綱及掌訣眞師曰有道之士得佩受修奉諸天内音靈寳眞文赤書玉訣八景天書鍊眞祕道修服老君六甲符靈寳五符五嶽眞形圖三皇内文西嶽公禁山等符籙一一依科宜受持存修不怠者便得錬形易骨坐在立亡位爲洞玄上眞之任也籙中行事訣各具本文并在師傳付别有要妙修持洞玄部竟神眞感應得參上清諸法上清籙二十四階太極左眞人曲素訣辭一名九天鳯氣玄丘太眞書籙三天正法籙上皇玉籙龜山元籙飛行三界籙飛行羽章籙三元玉檢籙上元檢天大籙下元檢地玉籙中元檢仙眞書籙上清檢人仙籙靈飛六甲籙靈飛六甲内思籙六甲素奏丹符籙元始玉皇譜籙太微黄書九天八籙太微天帝君金虎眞符籙太上神虎玉籙八威召籠籙河圖寳籙太上八景晨圖籙豁落七元眞符一名帝君威靈籙流金火鈴籙攝山精圖籙上清洞眞諸劵紫紋交帶白紋交帶迴車畢道右巳前上清部是爲洞眞此略述師傅以陳梗㮣其受法籙經誥具奉道科也夫三洞六科緫六十階及三洞眞經共計一十八萬億三千一百八十卷今此世綿歷劫運凶災彌流仙曹代遷洞府收隱存世者鮮又爲世間傳冩文篆錯謬或僞加刪定隨俗造作以要名勢資求財賄先師代代修定文儀亦不能要其准的所以爾者由其世教之疑情僞之異也吾又安知三界内外諸天世間旣有文字言教亦因事跡而遷乎今當隨世所傳以其天書靈文信質于道但當平等一心仁孝一切斷情去欲清虛無爲事付至公理歸至當洞達無礙不滯有無是爲洞眞之要㫖也修寫經籙訣眞師云至誠感神精誠必應世間受經籙多不合儀則又師傳鹵莾而修奉懈怠或謂道籙不靈神仙無効斯自咎矣先師冩經籙儀範别有一卷今且略述其要買紙素丹青筆墨工用等物皆當合道貴其本之所來不得與人乖爭言利宜之情必虛懷潤物清靜護慎精意修理勿得穢雜雞犬異𩔖及婦人目視旣齋沐經月餘别處一靖室東向開小牎常燒香於左右施案敷本文嚴整衣冠心存玄師宻啓其意調氣染筆依儀篆寫丹青所用切忌牛皮膠即靈氣不降也當用鹿角膠和少乳頭香即得不脫以素以紙其揆一也籙卷上下長九寸以法太陽之大數欄頭上下朱郭凡九分上法九天下法九地其上下朱郭以法丹元之氣謂赤書玉文至陽之色象以破邪隂也上下朱郭各一分以法一氣之周布也欄頭上下皆雙界不得隙絶不均所以法四時也上法春夏下法秋冬其行長七寸以法七政也行闊五分以法五行若楷𨽻字數毎行不過二十字要令調而匀不得懸生露死謂死字不居行首生字不在行下當度其行間若弟子名號宜甚謹細亦勿使居行之首也此其法則不可不審至符篆圖畫務令均匀得所以畫籙文在其精詳用意爲之毎階未近軸留三行署監度保舉度師等三師法位姓名其装飾褾軸宜適豐儉隨力所辦務在嚴潔勿爲分外妄生憂慮其質信等物及符板緘囊皆先備擬一依科儀所說修冩都畢隨部入函盛之封題如法晨夕焚香於靜室勿使雜觸至受法齋辰師當啓授如儀正一修眞略儀
