front:
  text: 正一修眞略儀肆一眞經解云籙録也修眞之士旣神室明正然攝天地靈祇制魔伏鬼隨其功業列品仙階出有入无長生度世與道玄合故能濟度死厄救拔生靈巍巍功德莫不由修奉三洞眞經金書寳籙爲之津要也籙者太上神眞之靈文九天衆聖之祕言將以檢劾三界官屬御運元元統握群品鑒隲罪福考明功過善惡輕重紀于簡籍校誠宣示之文掌覽靈圖推定陽九百六天元劫數又當詔令天地萬靈隨功役使分别仙品衆官吏兵億乗萬騎仙童玉女列職主事驅䇿給侍之數目浩劫無窮太上十方至眞衆聖皆互禀師資結盟受授從俗登眞永保生道漸位于極必使依科次第明曉階秩詳審義目解其要旨然後終行一一宜依籙文明科禁誡安可率易乃罪福得失之驗如其文也且夫神符寳籙其出自然故於元始赤明浩劫之初渾茫之際空中自結飛玄妙氣成龍篆之章乃元始神尊化靈應氣然也是以生天立地萬化明分皆因道氣與靈文也經云未始无道未始无氣未始无文由是而言萬靈相資與化齊有者也故知天地萬靈不死皆由我心非我心知之即天地萬靈變化之道其誰是哉故云天地萬物最靈者人也可不察歟但悲夫禀性暗愚或生徼土而典法莫化五常莫知安可聞上聖之言三清妙法斯天罰也嗟乎慧福兼全生逢聖運靈文備世大法可傳而封滯俗情不能信受亦與夫愚徼同矣世人受道經戒佩服籙文縱未能次第依法修行亦巳不爲下鬼輪轉不滅與道有縁而況親行之乎功用淺深不離於巳不可預說今且聊解三洞籙文修行大旨將知至聖神眞宣詔法教其文其軌咸謂符會于玄玄之道焉
